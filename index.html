<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REFLEX PRO - Color Battle</title>
    <style>
        :root {
            --bg: #0b0b0b;
            --success: #2ecc71;
            --danger: #e74c3c;
            --primary: #3498db;
            --accent: #ff9f43;
        }
        body {
            margin: 0; padding: 0; background: var(--bg);
            color: white; font-family: 'Segoe UI', sans-serif;
            overflow: hidden; height: 100vh; touch-action: manipulation;
        }
        #game-container { width: 100vw; height: 100vh; position: relative; }

        /* হোম স্ক্রিন - পার্টিকেল ব্যাকগ্রাউন্ড */
        #home-screen {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 20%, #1a2a6c, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; text-align: center; overflow: hidden;
        }
        #home-screen::before {
            content: ''; position: absolute; width: 200%; height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="10" cy="10" r="1" fill="%23ffffff22"/><circle cx="80" cy="30" r="0.5" fill="%23ffffff33"/><circle cx="50" cy="70" r="1.5" fill="%23ffffff11"/></svg>');
            animation: float 20s linear infinite; opacity: 0.6;
        }
        @keyframes float { 0% {transform: translate(0,0);} 100% {transform: translate(-50%,-50%);} }

        #home-title {
            font-size: 3.8rem; margin-bottom: 30px; letter-spacing: 3px;
            background: linear-gradient(90deg, #00FFFF, #FF00FF, #FFFF00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulse 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        @keyframes pulse { 0%,100%{transform: scale(1);} 50%{transform: scale(1.05);} }

        /* বেরঙের বাটন - প্রতিটা আলাদা */
        .menu-btn {
            width: 300px; padding: 18px; margin: 12px; font-size: 1.3rem;
            cursor: pointer; border: none; border-radius: 18px;
            color: white; font-weight: 900; letter-spacing: 1px;
            transition: 0.3s; box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            position: relative; overflow: hidden; text-transform: uppercase;
        }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .menu-btn:hover::after { left: 100%; }

        .btn-classic { background: linear-gradient(135deg, #00C9FF, #92FE9D); box-shadow: 0 0 20px #00C9FF88; }
        .btn-speed { background: linear-gradient(135deg, #F7971E, #FFD200); box-shadow: 0 0 20px #F7971E88; }
        .btn-focus { background: linear-gradient(135deg, #00F260, #0575E6); box-shadow: 0 0 20px #00F26088; }
        .btn-ruler { background: linear-gradient(135deg, #DA22FF, #9733EE); box-shadow: 0 0 20px #DA22FF88; }

        #back-btn {
            position: absolute; top: 15px; left: 15px;
            padding: 12px 24px; background: linear-gradient(135deg, #ff416c, #ff4b2b);
            color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;
            z-index: 150; box-shadow: 0 4px 15px rgba(255,65,108,0.4); display: none;
        }

        #ui-layer {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-evenly; pointer-events: none; z-index: 100;
        }
        .ui-box { 
            background: rgba(255,255,255,0.08); padding: 10px 18px; border-radius: 12px; 
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #question-area {
            position: absolute; top: 80px; width: 100%; text-align: center;
            font-size: 1.5rem; font-weight: bold; display: none; z-index: 50;
        }

        .target     {
            position: absolute; display: flex; justify-content: center; align-items: center;
            font-weight: bold; border: 4px solid #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            user-select: none; touch-action: none; transition: 0.1s;
        }
        .target    :active { transform: scale(0.9); }
        .reflex-target     { border-radius: 50%; }
        .focus-target     { border-radius: 20px; width: 120px; height: 120px; }

        .triple-kill-text {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem; font-weight: 900; color: var(--accent);
            text-transform: uppercase; text-shadow: 0 0 15px red, 0 0 30px var(--accent);
            pointer-events: none; z-index: 1000;
            animation: ff_pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes ff_pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0; }
        }

        .shake { animation: shakeAnim 0.3s linear; }
        @keyframes shakeAnim {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-10px, -10px); }
            75% { transform: translate(10px, 10px); }
        }

        #result-screen {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            background: rgba(0,0,0,0.95); padding: 40px; border-radius: 30px;
            z-index: 300; width: 85%; border: 2px solid var(--primary);
            box-shadow: 0 0 40px rgba(52,152,219,0.5);
        }

        /* RULER DROP MODE STYLES - কালারফুল */
        #ruler-container {
            position: absolute; left: 50%; top: 100px;
            transform: translateX(-50%);
            width: 80px; height: 400px;
            background: linear-gradient(to bottom, #e0e0e0, #bdc3c7, #95a5a6);
            border: 3px solid #2c3e50; border-radius: 10px;
            display: none; z-index: 60; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .ruler-mark {
            position: absolute; width: 100%; height: 2px; background: #2c3e50; left: 0;
        }
        .ruler-number {
            position: absolute; right: 85px; font-size: 12px; color: #00FFFF; font-weight: bold;
            text-shadow: 0 0 5px #00FFFF;
        }
        #catch-line {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 200px; height: 6px; 
            background: linear-gradient(90deg, #e74c3c, #ff00ff);
            box-shadow: 0 0 15px #e74c3c, 0 0 30px #ff00ff;
            display: none; z-index: 70; border-radius: 3px;
            animation: catchPulse 1s ease-in-out infinite;
        }
        @keyframes catchPulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }

        #ruler-instruction {
            position: absolute; bottom: 50px; width: 100%; text-align: center;
            font-size: 1.2rem; font-weight: bold; display: none; z-index: 50;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        #ruler-click-area {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 55; display: none;
        }
        .screen-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 999; pointer-events: none;
            animation: flash 0.2s ease-out forwards;
        }
        @keyframes flash { 0%{opacity:0.8;} 100%{opacity:0;} }
    </style>
</head>
<body>

<div id="game-container">
    <button id="back-btn" onpointerdown="playButtonSound(); showHome()">← BACK</button>

    <div id="home-screen">
        <h1 id="home-title">⚡ REFLEX PRO</h1>
        <button class="menu-btn btn-classic" onpointerdown="playButtonSound(); initGame('classic')">🎯 CLASSIC MODE</button>
        <button class="menu-btn btn-speed" onpointerdown="playButtonSound(); initGame('evolution')">🚀 SPEED EVOLUTION</button>
        <button class="menu-btn btn-focus" onpointerdown="playButtonSound(); initGame('focus')">🧠 BRAIN FOCUS</button>
        <button class="menu-btn btn-ruler" onpointerdown="playButtonSound(); initGame('ruler')">📏 RULER DROP TEST</button>
    </div>

    <div id="ui-layer">
        <div class="ui-box" style="border-color:#00FFFF;">SCORE: <span id="score">0</span></div>
        <div class="ui-box" style="border-color:#FF00FF;">TIME: <span id="live-timer">0</span>ms</div>
        <div class="ui-box" style="border-color:#f1c40f">BEST: <span id="best-display">--</span></div>
    </div>

    <div id="question-area">Click text: <span id="target    -word" style="text-decoration: underline;"></span></div>

    <!-- RULER DROP ELEMENTS -->
    <div id="ruler-click-area"></div>
    <div id="ruler-container"></div>
    <div id="catch-line"></div>
    <div id="ruler-instruction">স্কেল পড়া শুরু হলে একবার ট্যাপ করো!</div>

    <div id="result-screen">
        <h1 id="result-title">GAME OVER</h1>
        <div id="final-stats"></div>
        <button class="menu-btn btn-classic" onpointerdown="playButtonSound(); showHome()">MAIN MENU</button>
    </div>
</div>
                    
<script src="script.js"></script>
</body>
</html>
